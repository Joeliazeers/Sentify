services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sentitube-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Mount fine-tuned model — populate backend/fine_tuned_model/ before running
      - ./backend/fine_tuned_model:/app/fine_tuned_model:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sentitube-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
